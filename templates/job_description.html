<!DOCTYPE html>
<html>
<head>
    <title>AI Interview</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f6fb;
        }

        .container{
            width:60%;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 5px 15px #ccc;
        }

        textarea{
            width:100%;
            height:220px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:20px;
            padding:12px 30px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>AI Smart Interview</h2>

<p>Paste the Job Description below.</p>

<form method="POST">

<textarea
name="job_description"
placeholder="Paste Job Description here..."
required></textarea>

<br>

<button type="submit">
Generate AI Questions
</button>

</form>

</div>

</body>
</html>
