<!DOCTYPE html>
<html>

<head>

<title>Leaderboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
}

.container{
width:80%;
margin:40px auto;
}

h1{
text-align:center;
color:#2563eb;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 5px 15px gray;
}

th{
background:#2563eb;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

.rank{
font-size:25px;
}

</style>

</head>


<body>


<div class="container">

<h1>🏆 Top Performers</h1>


<table>


<tr>

<th>Rank</th>
<th>Name</th>
<th>Total Score</th>
<th>Date</th>

</tr>


{% for user in users %}

<tr>

<td class="rank">

{{loop.index}}

</td>


<td>

{{user[0]}}

</td>


<td>

{{user[1]}}

</td>


<td>

{{user[2]}}

</td>


</tr>

{% endfor %}


</table>


</div>


</body>

</html>
