<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Quiz</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>SQL Quiz</h1>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>
</header>

<div class="container">

    <h2>SQL MCQ Test</h2>

    <form action="/submit_sql" method="POST">

        {% for q in questions %}

            <div class="question">

                <h3>Q{{ loop.index }}. {{ q[1] }}</h3>

                <label class="quiz-option">
                    <input type="radio" name="{{ q[0] }}" value="{{ q[2] }}" required>
                    {{ q[2] }}
                </label>

                <label class="quiz-option">
                    <input type="radio" name="{{ q[0] }}" value="{{ q[3] }}">
                    {{ q[3] }}
                </label>

                <label class="quiz-option">
                    <input type="radio" name="{{ q[0] }}" value="{{ q[4] }}">
                    {{ q[4] }}
                </label>

                <label class="quiz-option">
                    <input type="radio" name="{{ q[0] }}" value="{{ q[5] }}">
                    {{ q[5] }}
                </label>

                <hr>

            </div>

        {% endfor %}

        <button type="submit">Submit Quiz</button>

    </form>

</div>

</body>
</html>
