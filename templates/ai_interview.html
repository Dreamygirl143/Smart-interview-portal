<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Interview</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body>


<header>

<h1>🤖 AI Interviewer</h1>

<nav>

<a href="/dashboard">Dashboard</a>

<a href="/logout">Logout</a>

</nav>

</header>



<div class="container">


<div class="question">


<h2>Interview Question</h2>


<h3>
{{ question }}
</h3>



<form action="/evaluate_answer" method="POST">


<input type="hidden"
name="question"
value="{{question}}">



<textarea

name="answer"

rows="8"

cols="60"

placeholder="Type your answer here..."

required>

</textarea>


<br><br>


<button type="submit">

Submit Answer

</button>


</form>



</div>


</div>



</body>

</html>
